services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-test-app
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    pids_limit: 128
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.50"

  fluent-bit:
    image: fluent/fluent-bit:5.0.4
    container_name: devops-test-fluent-bit
    command: /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.conf
    volumes:
      - ./observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./observability/fluent-bit/parsers_app.conf:/fluent-bit/etc/parsers_app.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent-bit-state:/fluent-bit/state
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - loki
    networks:
      - app-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    pids_limit: 64
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"

  loki:
    image: grafana/loki:3.7.1
    container_name: devops-test-loki
    command: -config.file=/etc/loki/loki-config.yml
    expose:
      - "3100"
    volumes:
      - loki-data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    pids_limit: 256
    mem_limit: 1g
    mem_reservation: 512m
    cpus: "1.00"

  

  grafana:
    image: grafana/grafana:13.0.1
    container_name: devops-test-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - loki
    networks:
      - app-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    pids_limit: 256
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.50"

volumes:
  loki-data:
  grafana-data:
  fluent-bit-state:

networks:
  app-network:
    driver: bridge